<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AgentForge Local Bridge</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 320px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #18181b 0%, #09090b 100%);
      color: #fff;
    }
    
    .container {
      padding: 20px;
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #eab308 0%, #f97316 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    
    .title {
      font-size: 16px;
      font-weight: 700;
    }
    
    .subtitle {
      font-size: 11px;
      color: #71717a;
    }
    
    .status-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    
    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .status-label {
      font-size: 13px;
      color: #a1a1aa;
    }
    
    .status-value {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    
    .status-dot.connected {
      background: #22c55e;
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
    }
    
    .status-dot.disconnected {
      background: #ef4444;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .config-section {
      margin-bottom: 16px;
    }
    
    .config-title {
      font-size: 11px;
      font-weight: 600;
      color: #71717a;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }
    
    .config-item {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
    }
    
    .config-item-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    
    .config-item-icon {
      font-size: 16px;
    }
    
    .config-item-name {
      font-size: 13px;
      font-weight: 600;
    }
    
    .config-item-path {
      font-size: 11px;
      color: #71717a;
      word-break: break-all;
    }
    
    .config-item-path.not-set {
      color: #f97316;
      font-style: italic;
    }
    
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #eab308 0%, #f97316 100%);
      color: #000;
    }
    
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(234, 179, 8, 0.3);
    }
    
    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }
    
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    
    .footer {
      text-align: center;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .footer-text {
      font-size: 11px;
      color: #52525b;
    }
    
    .footer-link {
      color: #eab308;
      text-decoration: none;
    }
    
    .footer-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">⚡</div>
      <div>
        <div class="title">AgentForge Bridge</div>
        <div class="subtitle">Local IDE Integration</div>
      </div>
    </div>
    
    <div class="status-card">
      <div class="status-row">
        <span class="status-label">Connection Status</span>
        <span class="status-value">
          <span id="status-dot" class="status-dot disconnected"></span>
          <span id="status-text">Disconnected</span>
        </span>
      </div>
    </div>
    
    <div class="config-section">
      <div class="config-title">Project Paths</div>
      
      <div class="config-item">
        <div class="config-item-header">
          <span class="config-item-icon">🎮</span>
          <span class="config-item-name">Unreal Engine</span>
        </div>
        <div id="unreal-path" class="config-item-path not-set">Not configured</div>
      </div>
      
      <div class="config-item">
        <div class="config-item-header">
          <span class="config-item-icon">🔷</span>
          <span class="config-item-name">Unity</span>
        </div>
        <div id="unity-path" class="config-item-path not-set">Not configured</div>
      </div>
    </div>
    
    <button id="connect-btn" class="btn btn-primary" style="margin-bottom: 8px;">
      <span>🔌</span>
      <span id="connect-text">Connect</span>
    </button>
    
    <button id="settings-btn" class="btn btn-secondary">
      <span>⚙️</span>
      <span>Open Settings</span>
    </button>
    
    <div class="footer">
      <div class="footer-text">
        Need help? <a href="https://agentforge.dev/docs/local-bridge" class="footer-link" target="_blank">View Documentation</a>
      </div>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
